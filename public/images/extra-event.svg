<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" rx="0" fill="#F3E5F5"/>
  <!-- Calendar -->
  <rect x="130" y="70" width="140" height="120" rx="10" fill="#FFFFFF" stroke="#CE93D8" stroke-width="2"/>
  <rect x="130" y="70" width="140" height="35" rx="10" fill="#AB47BC"/>
  <rect x="130" y="90" width="140" height="15" fill="#AB47BC"/>
  <!-- Calendar rings -->
  <rect x="160" y="62" width="8" height="20" rx="4" fill="#7B1FA2"/>
  <rect x="232" y="62" width="8" height="20" rx="4" fill="#7B1FA2"/>
  <!-- Calendar text -->
  <text x="200" y="92" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700" font-family="sans-serif">EVENT</text>
  <!-- Calendar grid dots (representing dates) -->
  <circle cx="155" cy="125" r="4" fill="#E1BEE7"/>
  <circle cx="175" cy="125" r="4" fill="#E1BEE7"/>
  <circle cx="195" cy="125" r="4" fill="#E1BEE7"/>
  <circle cx="215" cy="125" r="4" fill="#FF7043"/>
  <circle cx="235" cy="125" r="4" fill="#E1BEE7"/>
  <circle cx="155" cy="145" r="4" fill="#E1BEE7"/>
  <circle cx="175" cy="145" r="4" fill="#E1BEE7"/>
  <circle cx="195" cy="145" r="4" fill="#FF7043"/>
  <circle cx="215" cy="145" r="4" fill="#E1BEE7"/>
  <circle cx="235" cy="145" r="4" fill="#E1BEE7"/>
  <circle cx="155" cy="165" r="4" fill="#E1BEE7"/>
  <circle cx="175" cy="165" r="4" fill="#E1BEE7"/>
  <circle cx="195" cy="165" r="4" fill="#E1BEE7"/>
  <circle cx="215" cy="165" r="4" fill="#E1BEE7"/>
  <circle cx="235" cy="165" r="4" fill="#FF7043"/>
  <!-- Star decorations -->
  <polygon points="310,80 313,90 323,90 315,96 318,106 310,100 302,106 305,96 297,90 307,90" fill="#FFD54F"/>
  <polygon points="90,100 92,106 98,106 93,110 95,116 90,112 85,116 87,110 82,106 88,106" fill="#FFD54F" opacity="0.7"/>
  <!-- Confetti -->
  <rect x="85" y="70" width="6" height="12" rx="2" fill="#FF7043" transform="rotate(-20 88 76)"/>
  <rect x="305" y="130" width="5" height="10" rx="2" fill="#66BB6A" transform="rotate(15 307 135)"/>
  <rect x="95" y="150" width="5" height="10" rx="2" fill="#42A5F5" transform="rotate(-10 97 155)"/>
  <rect x="315" y="60" width="5" height="10" rx="2" fill="#AB47BC" transform="rotate(25 317 65)"/>
  <circle cx="80" cy="130" r="3" fill="#FFD54F"/>
  <circle cx="325" cy="105" r="3" fill="#FF7043"/>
</svg>