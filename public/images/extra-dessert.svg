<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" rx="0" fill="#FFF5F8"/>
  <!-- Cake plate -->
  <ellipse cx="200" cy="175" rx="70" ry="18" fill="#E8E0D8" opacity="0.4"/>
  <!-- Cake base -->
  <rect x="150" y="120" width="100" height="50" rx="8" fill="#F5E0C8"/>
  <rect x="150" y="120" width="100" height="50" rx="8" stroke="#E8CDB0" stroke-width="1.5"/>
  <!-- Cream layer -->
  <rect x="150" y="120" width="100" height="18" rx="8" fill="#FFFFFF" stroke="#F0E0D0" stroke-width="1"/>
  <!-- Frosting drip -->
  <path d="M150 128 Q155 140 150 135 M170 128 Q175 142 170 136 M195 128 Q200 145 195 138 M220 128 Q225 140 220 134 M245 128 Q250 138 245 132" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Strawberry on top -->
  <ellipse cx="185" cy="112" rx="10" ry="12" fill="#E53935"/>
  <path d="M183 102 Q185 96 187 102" stroke="#4CAF50" stroke-width="2" fill="#66BB6A"/>
  <!-- Another strawberry -->
  <ellipse cx="215" cy="114" rx="8" ry="10" fill="#E53935"/>
  <path d="M213 106 Q215 100 217 106" stroke="#4CAF50" stroke-width="2" fill="#66BB6A"/>
  <!-- Small dots on strawberry -->
  <circle cx="183" cy="110" r="1" fill="#FF8A80"/>
  <circle cx="187" cy="114" r="1" fill="#FF8A80"/>
  <circle cx="213" cy="112" r="1" fill="#FF8A80"/>
  <circle cx="217" cy="116" r="1" fill="#FF8A80"/>
  <!-- Fruit pieces -->
  <circle cx="165" cy="110" r="6" fill="#FFB74D"/>
  <circle cx="235" cy="112" r="5" fill="#81C784"/>
  <!-- Cake pattern -->
  <line x1="160" y1="145" x2="240" y2="145" stroke="#E8CDB0" stroke-width="0.5" stroke-dasharray="4 4"/>
</svg>