<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!-- Dark green square background -->
  <rect x="0" y="0" width="80" height="80" rx="4" fill="#1A5C2A"/>

  <!-- White horizontal line -->
  <line x1="8" y1="22" x2="52" y2="22" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- "woori" text inside the square -->
  <text x="10" y="52" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="900" fill="#8BC34A" letter-spacing="-0.5">woori</text>

  <!-- "food and service Inc." below woori inside square -->
  <text x="10" y="64" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8.5" font-weight="400" fill="#A8D86C">food and service Inc.</text>

  <!-- Company name in Korean next to the square -->
  <text x="92" y="42" font-family="'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="#1A5C2A">(주)우리푸드앤드서비스</text>

  <!-- Tagline -->
  <text x="92" y="60" font-family="'Noto Sans KR', sans-serif" font-size="11" font-weight="400" fill="#5A5A5A">신선한 식사, 건강한 내일</text>
</svg>